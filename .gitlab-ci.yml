# kaizen CI backstop for GitLab — mirrors .harness/ci/kaizen-gate.yml's logic (Current-Debt #2:
# forge lock-in). Local hooks can be bypassed (--no-verify); this job cannot. Copied to
# .gitlab-ci.yml at the repo root by `kaizen init` (never clobbers an existing .gitlab-ci.yml).
# Pair with a GitLab "merge request approvals" / protected-branch pipeline-must-succeed rule for the
# same un-bypassable guarantee GitHub gets from branch protection on kaizen-gate.yml.
image: node:20

stages:
  - enforce

kaizen-gate:
  stage: enforce
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" || $CI_PIPELINE_SOURCE == "merge_request_event"'
  script:
    - node .harness/scripts/doctor.mjs
    - node .harness/scripts/verify.mjs --phase full
