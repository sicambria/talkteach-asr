name: CI

# Quality gate on every push and PR (roadmap #38). Three independent jobs —
# Python, UI, Rust — so a failure points straight at the layer that broke.
# Heavy ML/GPU paths are NOT run here (they live behind the `integration`/`ffmpeg`
# pytest markers); CI exercises the light, deterministic core that must always
# stay green without a GPU. See DECISIONS.md D-002.

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python (lint · type · test)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Create venv + install (light + dev deps only — no GPU/ML)
        run: |
          uv venv backend/.venv --python ${{ matrix.python-version }}
          VIRTUAL_ENV=backend/.venv uv pip install -e 'backend[dev]'
      - name: Ruff lint
        run: backend/.venv/bin/ruff check backend/talkteach backend/tests
      - name: Ruff format check
        run: backend/.venv/bin/ruff format --check backend/talkteach backend/tests
      # Mypy analyses against the config's pinned `python_version = "3.10"`
      # regardless of the runner interpreter, so type results don't vary across
      # the matrix — run it once. (Running it under 3.12 also trips a spurious
      # parse error on newer numpy's PEP 695 `type` stubs, since the parser
      # follows our pinned 3.10 target.) Tests still run on every version.
      - name: Mypy
        if: matrix.python-version == '3.11'
        run: backend/.venv/bin/mypy --config-file backend/pyproject.toml backend/talkteach
      - name: Pytest
        run: cd backend && .venv/bin/python -m pytest -q

  ui:
    name: UI (build · check · format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: cd ui && npm ci
      - name: Build
        run: cd ui && npm run build
      - name: svelte-check
        run: cd ui && npm run check
      - name: Prettier format check
        run: cd ui && npm run format:check
      - name: ESLint
        run: cd ui && npm run lint

  rust:
    name: Rust (fmt · clippy · check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps for Tauri (Linux WebKit/GTK)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: rustfmt
        run: cd src-tauri && cargo fmt --check
      # tauri.conf.json declares the backend sidecar as `externalBin`, so the
      # tauri build script fails the compile if that file is missing. The real
      # binary is a per-OS PyInstaller freeze produced in the release pipeline
      # (see RELEASING.md); for the lint/check gate a stub at the host target
      # triple is enough to let clippy/check resolve the resource.
      - name: Stub backend sidecar for clippy/check
        run: |
          mkdir -p src-tauri/binaries
          stub="src-tauri/binaries/talkteach-backend-x86_64-unknown-linux-gnu"
          printf '#!/bin/sh\nexit 0\n' > "$stub"
          chmod +x "$stub"
      - name: clippy
        run: cd src-tauri && cargo clippy -- -D warnings
      - name: cargo check
        run: cd src-tauri && cargo check

  # The benchmark fast-path: proves the TTS→ASR WER *measurement* is real (clean
  # espeak speech transcribes with low WER; tones don't). NOT part of `pytest -q` —
  # it needs the [ml] extra (torch) + the espeak-ng binary, so it's a separate,
  # heavier job. Runs on push/manual only (kept off the hot PR path); the espeak
  # measurement test does no training, but [ml] install + a whisper-tiny download
  # make it slower than the light core. See project/docs/BENCHMARKING.md.
  benchmark-smoke:
    name: Benchmark smoke (TTS · measurement-is-real)
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install espeak-ng (system TTS binary)
        run: |
          sudo apt-get update
          sudo apt-get install -y espeak-ng
          # Fail loudly if the binary isn't actually on PATH — otherwise the espeak
          # tests would all skip and the job would pass green without testing anything.
          espeak-ng --version
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: uv python install 3.11
      - name: Create venv + install [ml,tts]
        run: |
          uv venv backend/.venv --python 3.11
          VIRTUAL_ENV=backend/.venv uv pip install -e 'backend[ml,tts,dev]'
      - name: Pytest (espeak fast-path)
        run: cd backend && .venv/bin/python -m pytest -m espeak -q
