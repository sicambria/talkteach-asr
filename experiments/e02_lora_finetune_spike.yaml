# Experiment E02: LoRA Fine-Tuning Spike (1-3 epochs, whisper-tiny)
#
# Status: COMPLETE (2026-07-08) — NEGATIVE RESULT
# Results: docs/testing/journey-s2-finetune-spike.md

experiment: e02_lora_finetune_spike
hypothesis: |
  Fine-tuning whisper-tiny on 30-60 min of LibriSpeech with LoRA will yield
  >=20% relative WER reduction on test-clean.

metric: wer_on_librichspeech_test_clean
binding_axis: WER (pooled, normalized)

baseline:
  pretrained_whisper_tiny: 0.0516  # Stage 1

dod: |
  Fine-tuned WER <= 4.1% (>=20% relative reduction from 5.16%)
  OR robust negative result with >=2 runs confirming degradation.

results:
  run_30min_1ep: { baseline_wer: 0.0516, finetuned_wer: 0.0592, rel_change: -14.9% }
  run_60min_3ep: { baseline_wer: 0.0516, finetuned_wer: 0.0546, rel_change: -5.8% }

banked: false
verdict: HYPOTHESIS FALSIFIED
banked_claims:
  - "LoRA fine-tuning on LibriSpeech degrades whisper-tiny WER (robust across 2 runs)"
  - "Whisper-tiny is near-Pareto-optimal on LibriSpeech — pretrained model at 5.16% cannot be improved with more same-domain data"
  - "Training infrastructure works end-to-end (data→LoRA→train→save→eval)"

caveats:
  - "Only whisper-tiny tested (small would take 6-12h/ep on CPU)"
  - "Encoder frozen throughout"
  - "No hyperparameter sweep (LR, LoRA rank, epochs)"
  - "Training eval WER (18-21%) discrepant with inference WER (5.5%) — suggests methodological issue"

pivot: |
  Strategic path is model size, not fine-tuning.
  whisper-small at 2.69% WER is within 0.89pp of SOTA.
  Fine-tuning should target out-of-domain adaptation where pretrained model is weak.
